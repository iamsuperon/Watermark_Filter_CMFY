<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Watermarker — CMFY</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* --- FONT LOADING --- */
        @font-face {
            font-family: 'AGBookBold';
            src: url('AG Book Rounded Bold.otf') format('opentype');
            font-weight: 700;
        }

        :root {
            --bg: #f5f3ef;
            --surface: #ffffff;
            --surface2: #f9f8f6;
            --border: #e2ddd6;
            --border-strong: #c9c3b8;
            --text: #1a1814;
            --text-muted: #7a7469;
            --text-faint: #a09890;
            --accent: #1a1814;
            --accent-fg: #ffffff;
            --radius: 12px;
            --radius-sm: 8px;
            --font-main: 'AGBookBold', sans-serif;
        }

        [data-theme="dark"] {
            --bg: #1a1917;
            --surface: #242220;
            --surface2: #2e2b28;
            --border: #3a3733;
            --border-strong: #4e4a45;
            --text: #f0ede8;
            --text-muted: #9a9088;
            --text-faint: #6a6360;
            --accent: #f0ede8;
            --accent-fg: #1a1917;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            line-height: 1.4;
            transition: background 0.3s;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 520px; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; }
        .header h1 { font-size: 24px; letter-spacing: -0.5px; }
        .header p { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }

        #dark-mode-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            font-family: var(--font-main);
            font-size: 12px;
            cursor: pointer;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Upload Area */
        .upload-card {
            background: var(--surface);
            border: 1.5px dashed var(--border-strong);
            border-radius: var(--radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .upload-card:hover { border-color: var(--text); background: var(--surface2); }
        .upload-card .icon { font-size: 24px; margin-bottom: 12px; display: block; }
        .upload-card h3 { font-size: 15px; margin-bottom: 4px; }
        .upload-card p { font-size: 12px; color: var(--text-faint); font-weight: 700; }

        /* Panel Styling */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .panel-section { padding: 20px; border-bottom: 1px solid var(--border); }
        .panel-section:last-child { border-bottom: none; }
        .section-label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; display: block; }

        /* Form Elements */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        .field.full { grid-column: span 2; }
        .field label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); }

        input[type="text"], select {
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: var(--radius-sm);
            font-family: var(--font-main);
            font-size: 14px;
            color: var(--text);
            outline: none;
        }

        /* Sliders */
        .slider-box { display: flex; align-items: center; gap: 12px; }
        input[type="range"] {
            flex: 1; -webkit-appearance: none; height: 4px; background: var(--border); border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--text); cursor: pointer;
        }
        .val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); min-width: 30px; text-align: right; }

        /* Switches */
        .row { display: flex; justify-content: space-between; align-items: center; }
        .switch { position: relative; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: var(--border); border-radius: 34px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background: var(--text); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* Filter Strip */
        .filter-strip { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .filter-item { flex: 0 0 70px; text-align: center; cursor: pointer; }
        .filter-thumb { width: 70px; height: 55px; border-radius: 8px; border: 2px solid transparent; margin-bottom: 6px; background: #ddd; transition: 0.2s; }
        .filter-item.active .filter-thumb { border-color: var(--text); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
        .filter-item span { font-size: 11px; color: var(--text); display: block; }

        /* Action Button */
        #download-btn {
            width: 100%; background: var(--accent); color: var(--accent-fg);
            padding: 16px; border-radius: var(--radius); border: none;
            font-family: var(--font-main); font-size: 15px; cursor: pointer;
            margin-top: 10px; transition: 0.2s;
        }
        #download-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Canvas Preview */
        .preview-container { margin-top: 24px; display: none; }
        canvas { width: 100%; height: auto; border-radius: var(--radius); border: 1px solid var(--border); display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>Photo Watermarker</h1>
            <p>BY COMFY</p>
        </div>
        <button id="dark-mode-toggle">Dark</button>
    </div>

    <div class="upload-card" id="drop-zone">
        <span class="icon">📸</span>
        <h3>Click or drag & drop a photo</h3>
        <p>PNG, JPG, WEBP SUPPORTED</p>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <div class="panel">
        <div class="panel-section">
            <span class="section-label">Watermark</span>
            <div class="grid">
                <div class="field full">
                    <label>Text</label>
                    <input type="text" id="wText" value="CMFY">
                </div>
                <div class="field">
                    <label>Size (%) <span class="val" id="sizeVal">4%</span></label>
                    <input type="range" id="wSize" min="1" max="20" value="4">
                </div>
                <div class="field">
                    <label>Opacity <span class="val" id="opVal">0.9</span></label>
                    <input type="range" id="wOpacity" min="0.1" max="1" step="0.1" value="0.9">
                </div>
            </div>
        </div>

        <div class="panel-section">
            <div class="row">
                <span style="font-size: 14px;">Photo border</span>
                <label class="switch">
                    <input type="checkbox" id="borderToggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="panel-section">
            <span class="section-label">Film (VSCO Kodak)</span>
            <div class="filter-strip" id="filterStrip"></div>
        </div>
    </div>

    <button id="download-btn" disabled>Download Image</button>

    <div class="preview-container" id="previewWrap">
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('drop-zone');
    const dlBtn = document.getElementById('download-btn');
    
    let img = null;
    let currentFilter = 'none';

    // Film Presets Logic
    const filmPresets = {
        none: { name: 'None', color: '#eeeeee' },
        kp4: { name: 'KP4', color: '#f5e0d0', grade: (d) => { for(let i=0; i<d.length; i+=4){ d[i]*=1.1; d[i+2]*=0.9; } } },
        kg200: { name: 'KG200', color: '#f5e8c0', grade: (d) => { for(let i=0; i<d.length; i+=4){ d[i]*=1.15; d[i+2]*=0.8; } } },
        ka: { name: 'KA', color: '#b0d8f0', grade: (d) => { for(let i=0; i<d.length; i+=4){ d[i+1]*=1.1; d[i+2]*=1.15; } } }
    };

    function init() {
        // Create filter buttons
        const strip = document.getElementById('filterStrip');
        Object.keys(filmPresets).forEach(key => {
            const item = document.createElement('div');
            item.className = `filter-item ${key === currentFilter ? 'active' : ''}`;
            item.innerHTML = `<div class="filter-thumb" style="background:${filmPresets[key].color}"></div><span>${filmPresets[key].name}</span>`;
            item.onclick = () => {
                currentFilter = key;
                document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                draw();
            };
            strip.appendChild(item);
        });

        // Event Listeners
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);
        document.querySelectorAll('input').forEach(el => el.oninput = draw);
        document.getElementById('dark-mode-toggle').onclick = toggleDark;
    }

    function toggleDark() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
        document.getElementById('dark-mode-toggle').textContent = isDark ? 'Dark' : 'Light';
    }

    function handleFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            img = new Image();
            img.onload = draw;
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function draw() {
        if (!img) return;

        const borderOn = document.getElementById('borderToggle').checked;
        const borderPx = borderOn ? Math.round(Math.min(img.width, img.height) * 0.08) : 0;

        canvas.width = img.width + (borderPx * 2);
        canvas.height = img.height + (borderPx * 2);

        // Draw Surface
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, borderPx, borderPx);

        // Apply Grade
        if (currentFilter !== 'none') {
            let idata = ctx.getImageData(borderPx, borderPx, img.width, img.height);
            filmPresets[currentFilter].grade(idata.data);
            ctx.putImageData(idata, borderPx, borderPx);
        }

        // --- WATERMARK ---
        const text = document.getElementById('wText').value;
        const sizePct = document.getElementById('wSize').value;
        const opacity = document.getElementById('wOpacity').value;
        
        document.getElementById('sizeVal').textContent = sizePct + '%';
        document.getElementById('opVal').textContent = opacity;

        const fontSize = Math.round(canvas.width * (sizePct / 100));
        ctx.font = `700 ${fontSize}px AGBookBold, sans-serif`;
        ctx.fillStyle = `rgba(0,0,0,${opacity})`;
        ctx.textAlign = 'right';
        ctx.textBaseline = 'bottom';

        const margin = canvas.width * 0.04;
        ctx.fillText(text, canvas.width - margin, canvas.height - margin);

        document.getElementById('previewWrap').style.display = 'block';
        dlBtn.disabled = false;
    }

    dlBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = 'watermarked-photo.png';
        link.href = canvas.toDataURL();
        link.click();
    };

    // Ensure font is ready before first draw
    document.fonts.ready.then(() => { if(img) draw(); });
    init();
</script>
</body>
</html>
