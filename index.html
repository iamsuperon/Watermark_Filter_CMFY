<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Watermarker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* --- CUSTOM FONT LOADING --- */
  @font-face {
    font-family: 'AGBookBold';
    src: url('AG Book Rounded Bold.otf') format('opentype');
    font-weight: 700;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --surface2: #f9f8f6;
    --border: #e2ddd6;
    --border-strong: #c9c3b8;
    --text: #1a1814;
    --text-muted: #7a7469;
    --text-faint: #a09890;
    --accent: #1a1814;
    --accent-fg: #ffffff;
    --radius: 10px;
    --radius-sm: 6px;
    /* Main UI Font set to your custom Bold font */
    --font-main: 'AGBookBold', 'DM Sans', sans-serif;
  }

  [data-theme="dark"] {
    --bg: #1a1917;
    --surface: #242220;
    --surface2: #2e2b28;
    --border: #3a3733;
    --border-strong: #4e4a45;
    --text: #f0ede8;
    --text-muted: #9a9088;
    --text-faint: #6a6360;
    --accent: #f0ede8;
    --accent-fg: #1a1917;
  }

  body {
    font-family: var(--font-main);
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    color: var(--text);
    transition: background 0.2s, color 0.2s;
    -webkit-font-smoothing: antialiased;
  }
  .app { width: 100%; max-width: 560px; }

  .header {
    margin-bottom: 28px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  .header-text h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
  .header-text p { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-weight: 700; opacity: 0.8; }

  #dark-mode-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 12px;
    font-family: var(--font-main);
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #dark-mode-btn:hover { border-color: var(--border-strong); color: var(--text); }

  .drop-zone {
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 16px;
  }
  .drop-zone:hover, .drop-zone.hover { border-color: var(--accent); background: var(--surface2); }
  .drop-zone .label { font-size: 15px; font-weight: 700; color: var(--text); }
  .drop-zone .sublabel { font-size: 12px; color: var(--text-faint); margin-top: 4px; font-weight: 700; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .panel-section { padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .section-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--text-faint); margin-bottom: 12px;
  }

  .field label {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .field input[type="text"], .field select {
    font-family: var(--font-main); font-size: 14px; font-weight: 700; color: var(--text);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px; outline: none; width: 100%;
  }

  .toggle-label { font-size: 14px; font-weight: 700; color: var(--text); }
  
  #dl-btn {
    width: 100%; padding: 14px; background: var(--accent); color: var(--accent-fg);
    border: none; border-radius: var(--radius); font-family: var(--font-main);
    font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 16px;
    transition: opacity 0.15s;
  }
  #dl-btn:disabled { background: var(--border); color: var(--text-faint); cursor: not-allowed; }

  .preview-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; display: none;
  }
  canvas { width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-text">
      <h1>Photo Watermarker</h1>
      <p>BY COMFY</p>
    </div>
    <button id="dark-mode-btn">Dark</button>
  </div>

  <div class="drop-zone" id="drop-zone">
    <div class="label">Click or drag & drop a photo</div>
    <div class="sublabel">PNG, JPG, WEBP</div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
  </div>

  <button id="dl-btn" disabled>Download image</button>

  <div class="panel">
    <div class="panel-section">
      <div class="section-title">Watermark</div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div class="field" style="grid-column: span 2;">
          <label>Text</label>
          <input type="text" id="wText" value="CMFY">
        </div>
        <div class="field">
          <label>Size (%)</label>
          <input type="range" id="wSize" min="1" max="25" value="4">
        </div>
        <div class="field">
          <label>Opacity</label>
          <input type="range" id="wOpacity" min="0.1" max="1" step="0.1" value="0.9">
        </div>
        <div class="field" style="grid-column: span 2;">
          <label>Position</label>
          <select id="wPos">
            <option value="bottom-right">Bottom right</option>
            <option value="bottom-left">Bottom left</option>
            <option value="top-right">Top right</option>
            <option value="top-left">Top left</option>
          </select>
        </div>
      </div>
    </div>
    
    <div class="panel-section">
        <div class="toggle-label">Photo border</div>
        <input type="checkbox" id="borderToggle">
    </div>
  </div>

  <div class="preview-wrap" id="preview-wrap">
    <canvas id="mainCanvas"></canvas>
  </div>
</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('drop-zone');
  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  const dlBtn = document.getElementById('dl-btn');
  const previewWrap = document.getElementById('preview-wrap');

  let img = null;

  // Trigger file select
  dropZone.onclick = () => fileInput.click();
  fileInput.onchange = (e) => handleFile(e.target.files[0]);

  function handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      img = new Image();
      img.onload = draw;
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // Update on any input change
  document.querySelectorAll('input, select').forEach(el => {
    el.oninput = draw;
  });

  function draw() {
    if (!img) return;

    // Check for border
    const borderOn = document.getElementById('borderToggle').checked;
    const borderPx = borderOn ? Math.round(Math.min(img.width, img.height) * 0.08) : 0;

    canvas.width = img.width + (borderPx * 2);
    canvas.height = img.height + (borderPx * 2);

    // Draw Background/Border
    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Draw Image
    ctx.drawImage(img, borderPx, borderPx);

    // --- WATERMARK LOGIC ---
    const text = document.getElementById('wText').value;
    const sizePct = document.getElementById('wSize').value;
    const opacity = document.getElementById('wOpacity').value;
    const pos = document.getElementById('wPos').value;

    const fontSize = Math.round(canvas.width * (sizePct / 100));
    
    // Explicitly using the Bold Custom Font for the watermark
    ctx.font = `700 ${fontSize}px AGBookBold, sans-serif`; 
    ctx.fillStyle = `rgba(0,0,0,${opacity})`; // Defaulting to black for the "CMFY" look
    ctx.textBaseline = 'middle';

    const margin = canvas.width * 0.04;
    let x, y;

    if (pos === 'bottom-right') {
      ctx.textAlign = 'right';
      x = canvas.width - margin;
      y = canvas.height - margin;
    } else if (pos === 'bottom-left') {
      ctx.textAlign = 'left';
      x = margin;
      y = canvas.height - margin;
    } else if (pos === 'top-right') {
      ctx.textAlign = 'right';
      x = canvas.width - margin;
      y = margin;
    } else {
      ctx.textAlign = 'left';
      x = margin;
      y = margin;
    }

    ctx.fillText(text, x, y);

    previewWrap.style.display = 'block';
    dlBtn.disabled = false;
  }

  dlBtn.onclick = () => {
    const link = document.createElement('a');
    link.download = 'watermarked-photo.png';
    link.href = canvas.toDataURL();
    link.click();
  };

  // Re-draw once fonts are loaded
  document.fonts.ready.then(() => {
    if (img) draw();
  });
</script>
</body>
</html>
